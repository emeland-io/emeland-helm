{{- if .Values.filter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "emeland.fullname" . }}-filter
  labels:
    {{- include "emeland.labels" . | nindent 4 }}
    component: filter
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "emeland.selectorLabels" . | nindent 6 }}
      component: filter
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "emeland.labels" . | nindent 8 }}
        component: filter
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "emeland.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: filter
          image: {{ include "emeland.filterImage" . | quote }}
          imagePullPolicy: {{ .Values.image.filter.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: SERVICE_ADDR
              value: ":8080"
            - name: DATA_DIR
              value: "/data"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
        {{- if and .Values.filter.registerWebserver .Values.server.enabled }}
        {{ include "emeland.registerSubscriberContainer" (list . "register-webserver" (include "emeland.filterLocalApiUrl" .) (tpl (index .Values.filter.downstreamSubscribers 0) .)) | nindent 8 }}
        {{- end }}
        {{- if (index .Values "modelsrv-k8s-sensor").enabled }}
        {{ include "emeland.registerSubscriberContainer" (list . "register-k8s-sensor" (include "emeland.k8sSensorPublisherApiUrl" .) (include "emeland.filterApiUrl" .)) | nindent 8 }}
        {{- end }}
      volumes:
        - name: data
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---

{{- end }}

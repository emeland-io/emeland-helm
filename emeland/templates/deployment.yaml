{{- if .Values.gitsensor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "emeland.fullname" . }}-gitsensor
  labels:
    {{- include "emeland.labels" . | nindent 4 }}
    component: gitsensor
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "emeland.selectorLabels" . | nindent 6 }}
      component: gitsensor
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "emeland.labels" . | nindent 8 }}
        component: gitsensor
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "emeland.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gitsensor
          image: {{ include "emeland.gitsensorImage" . | quote }}
          imagePullPolicy: {{ .Values.image.gitsensor.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - -config
            - /config/sensor.yaml
            - -listen
            - "0.0.0.0:{{ .Values.gitsensor.listenPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.gitsensor.listenPort }}
              protocol: TCP
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: gitsensor-config
              mountPath: /config
              readOnly: true
            - name: deploy-key
              mountPath: /keys
              readOnly: true
            - name: work
              mountPath: /work
        {{- if and .Values.filter.enabled .Values.gitsensor.registerFilter }}
        {{ include "emeland.registerSubscriberContainer" (list . "register-filter" (printf "http://127.0.0.1:%v/api/" .Values.gitsensor.listenPort) (include "emeland.filterApiUrl" .)) | nindent 8 }}
        {{- end }}
      volumes:
        - name: gitsensor-config
          configMap:
            name: {{ include "emeland.fullname" . }}-gitsensor-config
        - name: deploy-key
          secret:
            secretName: {{ include "emeland.gitsensorDeployKeySecretName" . }}
            defaultMode: 0444
        - name: work
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
